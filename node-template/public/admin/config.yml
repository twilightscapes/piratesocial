              - { label: "Tag Text", name: tagText, widget: color, enableAlpha: true, default: "rgba(82, 82, 91, 1)" }
              - { label: "Card Background", name: cardBg, widget: color, enableAlpha: true, default: "rgba(255, 255, 255, 1)" }
              - { label: "Card Border", name: cardBorder, widget: color, enableAlpha: true, default: "rgba(228, 228, 231, 1)" }
              - { label: "Card Hover Border", name: cardHover, widget: color, enableAlpha: true, default: "rgba(212, 212, 216, 1)" }
              - { label: "Header Background", name: headerBg, widget: color, enableAlpha: true, default: "rgba(255, 255, 255, 1)" }
              - { label: "Footer Background", name: footerBg, widget: color, enableAlpha: true, default: "rgba(255, 255, 255, 1)" }

          - label: "Dark Mode Colors"
            name: dark
            widget: object
            collapsed: false
            fields:
