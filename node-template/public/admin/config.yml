              - { label: "Surface (cards)", name: surface, widget: color, enableAlpha: true, default: "rgba(24, 24, 27, 1)" }
              - { label: "Surface Border", name: surfaceBorder, widget: color, enableAlpha: true, default: "rgba(39, 39, 42, 1)" }
              - { label: "Surface Hover", name: surfaceHover, widget: color, enableAlpha: true, default: "rgba(39, 39, 42, 1)" }
              - { label: "Text", name: text, widget: color, enableAlpha: true, default: "rgba(244, 244, 245, 1)" }
