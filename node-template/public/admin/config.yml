                  - { label: "Barlow", value: "'Barlow', sans-serif" }
                  - { label: "Jost", value: "'Jost', sans-serif" }
                  - { label: "Merriweather", value: "'Merriweather', serif" }
                  - { label: "Playfair Display", value: "'Playfair Display', serif" }
                  - { label: "Lora", value: "'Lora', serif" }
                  - { label: "Libre Baskerville", value: "'Libre Baskerville', serif" }
                  - { label: "Crimson Text", value: "'Crimson Text', serif" }
                  - { label: "Source Serif 4", value: "'Source Serif 4', serif" }
                  - { label: "Cormorant Garamond", value: "'Cormorant Garamond', serif" }
                  - { label: "EB Garamond", value: "'EB Garamond', serif" }
                  - { label: "Bitter", value: "'Bitter', serif" }
                  - { label: "Noto Serif", value: "'Noto Serif', serif" }
                default: "system-ui, -apple-system, sans-serif"
              - label: Monospace Font
                name: mono
                widget: select
                options:
                  - { label: "System Mono", value: "ui-monospace, monospace" }
                  - { label: "JetBrains Mono", value: "'JetBrains Mono', monospace" }
                  - { label: "Fira Code", value: "'Fira Code', monospace" }
                  - { label: "Source Code Pro", value: "'Source Code Pro', monospace" }
                  - { label: "IBM Plex Mono", value: "'IBM Plex Mono', monospace" }
                  - { label: "Space Mono", value: "'Space Mono', monospace" }
                default: "ui-monospace, monospace"
              - label: "Heading Size Scale (0.8 = smaller, 1 = default, 1.3 = larger)"
                name: headingSize
                widget: string
                default: "1"
              - label: "Body Size Scale (0.8 = smaller, 1 = default, 1.2 = larger)"
                name: bodySize
                widget: string
                default: "1"

          - label: "Light Mode Colors"
            name: light
            widget: object
            collapsed: false
            fields:
              - { label: "Background", name: background, widget: color, enableAlpha: true, default: "rgba(255, 255, 255, 1)" }
              - { label: "Surface (cards)", name: surface, widget: color, enableAlpha: true, default: "rgba(255, 255, 255, 1)" }
              - { label: "Surface Border", name: surfaceBorder, widget: color, enableAlpha: true, default: "rgba(228, 228, 231, 1)" }
              - { label: "Surface Hover", name: surfaceHover, widget: color, enableAlpha: true, default: "rgba(244, 244, 245, 1)" }
              - { label: "Text", name: text, widget: color, enableAlpha: true, default: "rgba(24, 24, 27, 1)" }
              - { label: "Text Muted", name: textMuted, widget: color, enableAlpha: true, default: "rgba(82, 82, 91, 1)" }
