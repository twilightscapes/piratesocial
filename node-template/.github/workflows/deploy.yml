name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-hub:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Notify Pirate Social Hub
        run: |
          # Read hub URL from config (fallback to env var)
          HUB_URL="${{ vars.PIRATE_SOCIAL_HUB_URL || 'https://piratesocial-hub-production.up.railway.app' }}"
          GITHUB_USER="${{ github.repository_owner }}"

          curl -s -X POST "${HUB_URL}/api/webhooks/feed-updated" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"${GITHUB_USER}\"}" \
            || echo "Hub notification failed (non-fatal)"
