name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild weekly to pick up template updates
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout user repo
        uses: actions/checkout@v4
        with:
          path: user-repo

      - name: Fetch latest template
        uses: actions/checkout@v4
        with:
          repository: twilightscapes/piratesocial
          path: template-source
          sparse-checkout: node-template
          sparse-checkout-cone-mode: true

      - name: Merge template + user content
        run: |
          # Start with fresh template code
          cp -r template-source/node-template build
          
          # Overlay user content (these are the user's own files)
          # Posts, galleries, and other content
          if [ -d user-repo/src/content ]; then
            rm -rf build/src/content
            cp -r user-repo/src/content build/src/content
          fi
          
          # User settings (author, bio, etc.)
          if [ -f user-repo/src/data/settings.json ]; then
            cp user-repo/src/data/settings.json build/src/data/settings.json
          fi
          
          # User customizations (theme, labels, PWA — edited via Decap CMS)
          for f in labels.json theme.json pwa.json; do
            if [ -f "user-repo/src/data/$f" ]; then
              cp "user-repo/src/data/$f" "build/src/data/$f"
            fi
          done
          
          # User images (overlay on top of template images, user files win)
          if [ -d user-repo/public/images ]; then
            cp -r user-repo/public/images/. build/public/images/
          fi
          
          # Decap CMS config (has user's repo name, URLs)
          if [ -f user-repo/public/admin/config.yml ]; then
            mkdir -p build/public/admin
            cp user-repo/public/admin/config.yml build/public/admin/config.yml
          fi
          
          # Preserve user's package.json if they added custom dependencies
          if [ -f user-repo/package.json ]; then
            cp user-repo/package.json build/package.json
          fi
          
          # NOTE: astro.config.mjs is NOT copied from user repo.
          # The template version handles SITE_URL and BASE_PATH via env vars.
          
          echo "✅ Merged template + user content"
          echo "Template files from: twilightscapes/piratesocial/node-template"
          echo "User content from: ${{ github.repository }}"

      - name: Self-update workflow
        continue-on-error: true
        run: |
          TEMPLATE_WF="template-source/node-template/.github/workflows/deploy.yml"
          USER_WF="user-repo/.github/workflows/deploy.yml"
          if ! diff -q "$TEMPLATE_WF" "$USER_WF" > /dev/null 2>&1; then
            echo "🔄 Workflow updated from template"
            cp "$TEMPLATE_WF" "$USER_WF"
            cd user-repo
            git config user.email "piratesocial[bot]@users.noreply.github.com"
            git config user.name "Pirate Social Bot"
            git add .github/workflows/deploy.yml
            git commit -m "chore: auto-update deploy workflow from template" || true
            git push || echo "⚠️ Could not push workflow update (non-fatal)"
          else
            echo "✅ Workflow is up to date"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: build
        run: npm install

      - name: Determine base path
        id: base
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          # User sites (owner.github.io) have no base path; project sites need /reponame
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            echo "path=" >> $GITHUB_OUTPUT
          else
            echo "path=/${REPO_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Build site
        working-directory: build
        env:
          SITE_URL: ${{ github.event.repository.homepage || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
          BASE_PATH: ${{ steps.base.outputs.path }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-hub:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Notify Pirate Social Hub
        run: |
          # Read hub URL from config (fallback to env var)
          HUB_URL="${{ vars.PIRATE_SOCIAL_HUB_URL || 'https://piratesocial.app' }}"
          GITHUB_USER="${{ github.repository_owner }}"

          curl -s -X POST "${HUB_URL}/api/webhooks/feed-updated" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"${GITHUB_USER}\"}" \
            || echo "Hub notification failed (non-fatal)"
